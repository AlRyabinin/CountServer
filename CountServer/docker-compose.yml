services:
  countserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: countserver-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/count"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - countserver-network

networks:
  countserver-network:
    driver: bridge